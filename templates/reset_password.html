<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBot - Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body {
            background: #000a1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 10, 30, 0.90);
            z-index: 0;
        }
        .card {
            position: relative;
            z-index: 1;
            background: rgba(0, 5, 20, 0.95);
            border: 1px solid rgba(0, 120, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(0, 120, 255, 0.15);
        }
        .logo { text-align: center; margin-bottom: 8px; }
        .logo-icon {
            width: 56px; height: 56px;
            background: #0078ff;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem;
            margin: 0 auto 12px;
            box-shadow: 0 0 24px rgba(0,120,255,0.4);
        }
        .logo h1 { color: white; font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; }
        .logo h1 span { color: #0078ff; }
        .logo p { color: rgba(255,255,255,0.35); font-size: 0.72rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
        .divider { height: 1px; background: rgba(0,120,255,0.2); margin: 24px 0; }
        .form-group { margin-bottom: 18px; }
        label { color: rgba(255,255,255,0.5); font-size: 0.75rem; display: block; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        input {
            width: 100%; padding: 13px 16px;
            background: rgba(0,120,255,0.05);
            border: 1px solid rgba(0,120,255,0.2);
            border-radius: 10px; color: white;
            font-size: 0.95rem; outline: none;
            transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        input:focus { border-color: #0078ff; background: rgba(0,120,255,0.08); box-shadow: 0 0 0 3px rgba(0,120,255,0.1); }
        input::placeholder { color: rgba(255,255,255,0.2); }
        .hint { color: rgba(255,255,255,0.3); font-size: 0.75rem; margin-top: 5px; }
        button {
            width: 100%; padding: 14px;
            background: #0078ff; color: white; border: none;
            border-radius: 10px; font-size: 1rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
            margin-top: 8px; transition: all 0.2s;
            box-shadow: 0 0 20px rgba(0,120,255,0.3);
            font-family: 'Inter', sans-serif;
        }
        button:hover { background: #0060cc; box-shadow: 0 0 30px rgba(0,120,255,0.5); transform: translateY(-1px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error { color: #ff4444; font-size: 0.85rem; margin-top: 12px; text-align: center; display: none; padding: 8px; background: rgba(255,68,68,0.1); border-radius: 8px; }
        .success { color: #22c55e; font-size: 0.85rem; margin-top: 12px; text-align: center; display: none; padding: 8px; background: rgba(34,197,94,0.1); border-radius: 8px; }
        .links { margin-top: 20px; text-align: center; }
        .links a { color: rgba(255,255,255,0.35); font-size: 0.85rem; text-decoration: none; transition: color 0.2s; }
        .links a:hover { color: #0078ff; }
        .links a span { color: #0078ff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">F</div>
            <h1>Fit<span>Bot</span></h1>
            <p>Set New Password</p>
        </div>
        <div class="divider"></div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="new-password"/>
            <p class="hint">Minimum 6 characters</p>
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password" onkeypress="handleKey(event)"/>
        </div>

        <button id="reset-btn" onclick="resetPassword()">Reset Password 💪</button>
        <p class="error" id="error-msg"></p>
        <p class="success" id="success-msg"></p>

        <div class="links">
            <a href="/login">← <span>Back to Login</span></a>
        </div>
    </div>

    <script>
        const token = window.location.pathname.split('/').pop();

        async function resetPassword() {
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            const btn = document.getElementById('reset-btn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!password || !confirmPassword) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Please fill in all fields!';
                return;
            }
            if (password !== confirmPassword) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Passwords do not match!';
                return;
            }
            if (password.length < 6) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Password must be at least 6 characters!';
                return;
            }

            btn.textContent = 'Resetting...';
            btn.disabled = true;

            try {
                const response = await fetch(`/reset-password/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });

                const data = await response.json();

                if (data.success) {
                    successMsg.style.display = 'block';
                    successMsg.textContent = '✅ Password reset successfully! Redirecting to login...';
                    btn.textContent = '✅ Done!';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    btn.textContent = 'Reset Password 💪';
                    btn.disabled = false;
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = data.error || 'Something went wrong. Please try again!';
                }
            } catch (err) {
                btn.textContent = 'Reset Password 💪';
                btn.disabled = false;
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Network error. Please check your connection!';
            }
        }

        function handleKey(e) { if (e.key === 'Enter') resetPassword(); }
    </script>
</body>
</html>
