<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBot - Exercise Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body {
            background: #000a1e;
            min-height: 100vh;
            color: white;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 10, 30, 0.93);
            z-index: 0;
        }
        .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 20px 16px 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(0,120,255,0.2); }
        .header h1 { font-size: 1.5rem; font-weight: 900; }
        .header h1 span { color: #0078ff; }
        .back-btn { padding: 8px 16px; background: transparent; border: 1px solid #0078ff; color: #0078ff; border-radius: 20px; text-decoration: none; font-size: 0.85rem; transition: all 0.2s; }
        .back-btn:hover { background: #0078ff; color: white; }

        /* Category tabs */
        .category-section { margin-bottom: 32px; }
        .category-title { font-size: 1.1rem; font-weight: 700; color: white; margin-bottom: 4px; padding: 12px 0 8px; border-bottom: 2px solid #0078ff; display: flex; align-items: center; gap: 8px; }
        .category-subtitle { color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-bottom: 16px; }

        /* Filter tabs */
        .filter-row { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; overflow-x: auto; padding-bottom: 4px; }
        .filter-btn { padding: 8px 18px; border-radius: 25px; border: 1px solid rgba(0,120,255,0.2); background: transparent; color: rgba(255,255,255,0.6); font-size: 0.8rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; font-family: 'Inter', sans-serif; }
        .filter-btn:hover, .filter-btn.active { background: #0078ff; border-color: #0078ff; color: white; }

        /* Search */
        .search-bar { margin-bottom: 20px; }
        .search-input { width: 100%; padding: 12px 20px; background: rgba(0,120,255,0.05); border: 1px solid rgba(0,120,255,0.2); border-radius: 25px; color: white; font-size: 0.9rem; outline: none; font-family: 'Inter', sans-serif; }
        .search-input:focus { border-color: #0078ff; }
        .search-input::placeholder { color: rgba(255,255,255,0.3); }

        /* Exercise grid */
        .exercise-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

        /* Exercise card */
        .exercise-card {
            background: rgba(0,5,20,0.95);
            border: 1px solid rgba(0,120,255,0.15);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        .exercise-card:hover {
            border-color: #0078ff;
            transform: translateY(-3px);
            box-shadow: 0 6px 24px rgba(0,120,255,0.2);
        }

        .anim-box {
            height: 140px;
            background: rgba(0,120,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid rgba(0,120,255,0.08);
        }

        .tag-diff {
            position: absolute;
            top: 8px;
            left: 8px;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tag-muscle {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 3px 8px;
            background: rgba(0,120,255,0.15);
            border: 1px solid rgba(0,120,255,0.3);
            border-radius: 20px;
            font-size: 0.65rem;
            color: #0078ff;
            text-transform: uppercase;
        }
        .diff-beginner { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
        .diff-intermediate { background: rgba(234,179,8,0.15); color: #eab308; border: 1px solid rgba(234,179,8,0.3); }
        .diff-advanced { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

        .card-info { padding: 14px; }
        .card-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
        .card-desc { font-size: 0.78rem; color: rgba(255,255,255,0.45); line-height: 1.5; margin-bottom: 10px; }
        .card-stats { display: flex; gap: 12px; margin-bottom: 10px; }
        .card-stat { font-size: 0.72rem; color: rgba(255,255,255,0.35); }
        .card-stat span { color: #0078ff; font-weight: 600; }
        .view-btn { width: 100%; padding: 8px; background: rgba(0,120,255,0.08); border: 1px solid rgba(0,120,255,0.25); color: #0078ff; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .view-btn:hover { background: #0078ff; color: white; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,20,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.open { display: flex; }
        .modal { background: rgba(0,5,20,0.99); border: 1px solid rgba(0,120,255,0.3); border-radius: 20px; padding: 28px; max-width: 560px; width: 100%; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 14px; right: 14px; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 1.4rem; cursor: pointer; }
        .modal-close:hover { color: white; }
        .modal-anim { height: 160px; background: rgba(0,120,255,0.04); border-radius: 12px; margin-bottom: 18px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(0,120,255,0.1); }
        .modal-name { font-size: 1.3rem; font-weight: 900; margin-bottom: 6px; }
        .modal-tags { display: flex; gap: 8px; margin-bottom: 14px; }
        .modal-desc { color: rgba(255,255,255,0.5); font-size: 0.85rem; line-height: 1.6; margin-bottom: 18px; }
        .steps-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #0078ff; margin-bottom: 12px; }
        .step-item { display: flex; gap: 12px; margin-bottom: 10px; }
        .step-num { width: 22px; height: 22px; min-width: 22px; background: #0078ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
        .step-text { font-size: 0.85rem; color: rgba(255,255,255,0.65); line-height: 1.5; }
        .modal-ask-btn { width: 100%; padding: 12px; background: #0078ff; color: white; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-top: 18px; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .modal-ask-btn:hover { background: #0060cc; }

        /* No results */
        .no-results { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); }

        @media (max-width: 600px) {
            .exercise-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 400px) {
            .exercise-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="wrapper">

        <a href="/" class="back-btn">← Back to Chat</a>

        <button class="filter-btn" onclick="setFilter('back', this)">Back</button>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">

</div>

    { key:"legs", label:"🦵 Legs Workout", desc:"Quads, hamstrings, glutes, calves" },
    { key:"upper", label:"⬆️ Upper Body", desc:"Complete upper body compound movements" },
    { key:"lower", label:"⬇️ Lower Body", desc:"Complete lower body power movements" },
    { key:"full", label:"🔥 Full Body & Core & Cardio", desc:"Total body conditioning and core strength" },
];

let activeFilter = 'all';

function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
}

        back: `<svg width="100" height="110" viewBox="0 0 100 110"><line x1="10" y1="8" x2="90" y2="8" stroke="#0078ff" stroke-width="3" opacity=".4"/><g style="animation:pu 1.8s ease-in-out infinite;transform-origin:50px 55px"><circle cx="50" cy="26" r="8" fill="#0078ff" opacity=".8"/><line x1="44" y1="8" x2="34" y2="14" stroke="#0078ff" stroke-width="2.5"/><line x1="56" y1="8" x2="66" y2="14" stroke="#0078ff" stroke-width="2.5"/><line x1="50" y1="34" x2="50" y2="68" stroke="#0078ff" stroke-width="2.5"/><line x1="50" y1="46" x2="28" y2="60" stroke="#0078ff" stroke-width="2.5"/><line x1="50" y1="46" x2="72" y2="60" stroke="#0078ff" stroke-width="2.5"/><line x1="50" y1="68" x2="38" y2="96" stroke="#0078ff" stroke-width="2.5"/><line x1="50" y1="68" x2="62" y2="96" stroke="#0078ff" stroke-width="2.5"/></g><style>@keyframes pu{0%{transform:translateY(0)}50%{transform:translateY(-16px)}100%{transform:translateY(0)}}</style></svg>`,
    };
    const map = {chest:'push',back:'back',shoulders:'shoulders',biceps:'biceps',triceps:'triceps',legs:'legs',core:'core',cardio:'cardio'};
    const key = map[ex.muscle] || 'push';
    return anims[key] || `<div style="font-size:3rem;">${ex.emoji}</div>`;
}

function renderAll() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const container = document.getElementById('exercises-container');

    if (activeFilter !== 'all') {
        const filtered = EXERCISES.filter(ex => {
            const matchFilter = ex.group === activeFilter || ex.muscle === activeFilter;
            const matchSearch = !search || ex.name.toLowerCase().includes(search) || ex.muscle.includes(search) || ex.desc.toLowerCase().includes(search);
            return matchFilter && matchSearch;
        });
        container.innerHTML = filtered.length === 0
            ? '<div class="no-results">No exercises found. Try a different search.</div>'
            : `<div class="exercise-grid">${filtered.map(renderCard).join('')}</div>`;
        return;
    }

    let html = '';
    CATEGORIES.forEach(cat => {
        let list = EXERCISES.filter(ex => {
            const matchCat = ex.group === cat.key;
            const matchSearch = !search || ex.name.toLowerCase().includes(search) || ex.desc.toLowerCase().includes(search);
            return matchCat && matchSearch;
        });
        if (list.length === 0) return;
        html += `
            <div class="category-section">
                <div class="category-title">${cat.label}</div>
                <div class="category-subtitle">${cat.desc}</div>
                <div class="exercise-grid">${list.map(renderCard).join('')}</div>
            </div>`;
    });

    if (!html) html = '<div class="no-results">No exercises found. Try a different search.</div>';
    container.innerHTML = html;
}

function renderCard(ex) {
    return `
        <div class="exercise-card" onclick="openModal(${ex.id})">
            <div class="anim-box">
                ${getAnimation(ex)}
                <span class="tag-diff diff-${ex.difficulty}">${ex.difficulty}</span>
                <span class="tag-muscle">${ex.muscle}</span>
            </div>
            <div class="card-info">
                <div class="card-name">${ex.emoji} ${ex.name}</div>
                <div class="card-desc">${ex.desc}</div>
                <div class="card-stats">
                    <div class="card-stat">Sets: <span>${ex.sets}</span></div>
                    <div class="card-stat">Reps: <span>${ex.reps}</span></div>
                </div>
                <button class="view-btn">View Guide →</button>
            </div>
        </div>`;
}

function openModal(id) {
    const ex = EXERCISES.find(e => e.id === id);
    if (!ex) return;
    document.getElementById('modal-anim').innerHTML = getAnimation(ex);
    document.getElementById('modal-name').textContent = `${ex.emoji} ${ex.name}`;
    document.getElementById('modal-tags').innerHTML = `
        <span class="tag-diff diff-${ex.difficulty}" style="position:static;">${ex.difficulty}</span>
        <span class="tag-muscle" style="position:static;">${ex.muscle}</span>
        <span class="tag-muscle" style="position:static;">${ex.group} workout</span>`;
    document.getElementById('modal-desc').textContent = ex.desc;
    document.getElementById('modal-steps').innerHTML = ex.steps.map((s,i) => `
        <div class="step-item">
            <div class="step-num">${i+1}</div>
            <div class="step-text">${s}</div>
        </div>`).join('');
    document.getElementById('modal-ask-btn').onclick = () => {
        closeModal();
        sessionStorage.setItem('fitbot_message', `Create a ${ex.group} workout plan that includes ${ex.name}. Focus on ${ex.muscle} muscles.`);
        window.location.href = '/';
    };
    document.getElementById('modal').classList.add('open');
}

function closeModal() {
    document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

renderAll();
</script>
</body>
</html>
