<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBot - Exercise Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body {
            background: #000a1e;
            min-height: 100vh;
            color: white;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 10, 30, 0.93);
            z-index: 0;
        }
        .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 20px 16px 40px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(0,120,255,0.2); }
        .header h1 { font-size: 1.5rem; font-weight: 900; }
        .header h1 span { color: #0078ff; }
        .back-btn { padding: 8px 16px; background: transparent; border: 1px solid #0078ff; color: #0078ff; border-radius: 20px; text-decoration: none; font-size: 0.85rem; transition: all 0.2s; }
        .back-btn:hover { background: #0078ff; color: white; }

        /* Search and filter */
        .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 200px; padding: 11px 16px; background: rgba(0,120,255,0.05); border: 1px solid rgba(0,120,255,0.2); border-radius: 25px; color: white; font-size: 0.9rem; outline: none; }
        .search-input:focus { border-color: #0078ff; }
        .search-input::placeholder { color: rgba(255,255,255,0.3); }
        .filter-btn { padding: 10px 20px; border-radius: 25px; border: 1px solid rgba(0,120,255,0.2); background: transparent; color: rgba(255,255,255,0.6); font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .filter-btn:hover, .filter-btn.active { background: #0078ff; border-color: #0078ff; color: white; }

        /* Exercise grid */
        .exercise-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

        /* Exercise card */
        .exercise-card {
            background: rgba(0,5,20,0.95);
            border: 1px solid rgba(0,120,255,0.15);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        .exercise-card:hover {
            border-color: #0078ff;
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,120,255,0.2);
        }

        /* Animation container */
        .animation-box {
            height: 180px;
            background: rgba(0,120,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Exercise stick figure animations */
        .stick-figure { position: relative; width: 120px; height: 140px; }

        /* Push up animation */
        @keyframes pushup {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }

        /* Squat animation */
        @keyframes squat {
            0% { transform: scaleY(1); }
            50% { transform: scaleY(0.7) translateY(10px); }
            100% { transform: scaleY(1); }
        }

        /* Jump animation */
        @keyframes jump {
            0% { transform: translateY(0); }
            30% { transform: translateY(-30px); }
            60% { transform: translateY(0); }
            100% { transform: translateY(0); }
        }

        /* Curl animation */
        @keyframes curl {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-45deg); }
            100% { transform: rotate(0deg); }
        }

        /* Plank animation */
        @keyframes plank-pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Run animation */
        @keyframes run {
            0% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            100% { transform: translateX(-10px); }
        }

        .muscle-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 3px 10px;
            background: rgba(0,120,255,0.2);
            border: 1px solid rgba(0,120,255,0.3);
            border-radius: 20px;
            font-size: 0.7rem;
            color: #0078ff;
        }

        .difficulty-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .diff-beginner { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
        .diff-intermediate { background: rgba(234,179,8,0.15); color: #eab308; border: 1px solid rgba(234,179,8,0.3); }
        .diff-advanced { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

        .exercise-info { padding: 16px; }
        .exercise-name { font-size: 1rem; font-weight: 700; color: white; margin-bottom: 6px; }
        .exercise-desc { font-size: 0.8rem; color: rgba(255,255,255,0.5); line-height: 1.5; margin-bottom: 12px; }
        .exercise-stats { display: flex; gap: 12px; }
        .stat { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
        .stat span { color: #0078ff; font-weight: 600; }
        .try-btn { width: 100%; padding: 10px; background: rgba(0,120,255,0.1); border: 1px solid rgba(0,120,255,0.3); color: #0078ff; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 12px; }
        .try-btn:hover { background: #0078ff; color: white; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: rgba(0,5,20,0.98); border: 1px solid rgba(0,120,255,0.3); border-radius: 20px; padding: 32px; max-width: 600px; width: 90%; position: relative; }
        .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 1.5rem; cursor: pointer; }
        .modal-animation { height: 200px; background: rgba(0,120,255,0.05); border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
        .modal-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 8px; }
        .modal-steps { margin-top: 16px; }
        .step { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
        .step-num { width: 24px; height: 24px; background: #0078ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
        .step-text { font-size: 0.9rem; color: rgba(255,255,255,0.7); line-height: 1.5; }
        .ask-fitbot-btn { width: 100%; padding: 12px; background: #0078ff; color: white; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
        .ask-fitbot-btn:hover { background: #0060cc; }

        @media (max-width: 600px) {
            .exercise-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

                            <line x1="60" y1="25" x2="60" y2="65" stroke="#0078ff" stroke-width="3"/>
                            <line x1="60" y1="40" x2="30" y2="30" stroke="#0078ff" stroke-width="3"/>
                            <line x1="60" y1="40" x2="85" y2="55" stroke="#0078ff" stroke-width="3"/>
                            <line x1="60" y1="65" x2="35" y2="95" stroke="#0078ff" stroke-width="3"/>
                            <line x1="60" y1="65" x2="80" y2="90" stroke="#0078ff" stroke-width="3"/>
                        </g>
                        <style>
                            @keyframes run-anim {
                                0% { transform: translateX(-8px) rotate(-5deg); }
                                50% { transform: translateX(8px) rotate(5deg); }
                                100% { transform: translateX(-8px) rotate(-5deg); }
                            }
                        </style>
                    </svg>`
            };
            return animations[type] || `<div style="font-size:4rem;">${emoji}</div>`;
        }

        function renderExercises(list) {
            const grid = document.getElementById('exercise-grid');
            grid.innerHTML = list.map(ex => `
                <div class="exercise-card" data-muscle="${ex.muscle}" onclick="openModal(${ex.id})">
                    <div class="animation-box">
                        ${getAnimationHTML(ex.animation, ex.emoji)}
                        <span class="difficulty-tag diff-${ex.difficulty}">${ex.difficulty}</span>
                        <span class="muscle-tag">${ex.muscle}</span>
                    </div>
                    <div class="exercise-info">
                        <div class="exercise-name">${ex.emoji} ${ex.name}</div>
                        <div class="exercise-desc">${ex.description}</div>
                        <div class="exercise-stats">
                            <div class="stat">Sets: <span>${ex.sets}</span></div>
                            <div class="stat">Reps: <span>${ex.reps}</span></div>
                        </div>
                        <button class="try-btn">View Exercise Guide →</button>
                    </div>
                </div>
            `).join('');
        }

        function filterExercises() {
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = exercises.filter(ex => {
                const matchSearch = ex.name.toLowerCase().includes(search) || ex.muscle.toLowerCase().includes(search);
                const matchFilter = currentFilter === 'all' || ex.muscle === currentFilter;
                return matchSearch && matchFilter;
            });
            renderExercises(filtered);
        }

        function filterByMuscle(muscle, btn) {
            currentFilter = muscle;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterExercises();
        }

        function openModal(id) {
            const ex = exercises.find(e => e.id === id);
            currentExercise = ex;

            document.getElementById('modal-animation').innerHTML = getAnimationHTML(ex.animation, ex.emoji);
            document.getElementById('modal-title').textContent = `${ex.emoji} ${ex.name}`;
            document.getElementById('modal-desc').textContent = ex.description;
            document.getElementById('modal-steps').innerHTML = ex.steps.map((step, i) => `
                <div class="step">
                    <div class="step-num">${i+1}</div>
                    <div class="step-text">${step}</div>
                </div>
            `).join('');

            document.getElementById('modal-ask-btn').onclick = () => {
                closeModal();
                sessionStorage.setItem('fitbot_message', `Create a workout plan that includes ${ex.name}. I want to focus on ${ex.muscle}`);
                window.location.href = '/';
            };

            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Check if coming from exercise page
        window.addEventListener('load', () => {
            const msg = sessionStorage.getItem('fitbot_message');
            if (msg) {
                sessionStorage.removeItem('fitbot_message');
                const input = document.getElementById('user-input');
                if (input) {
                    input.value = msg;
                }
            }
        });

        renderExercises(exercises);
    </script>
</body>
</html>
