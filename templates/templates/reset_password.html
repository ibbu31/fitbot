<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBot - Reset Password</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#0a0a0a; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:#111; border:1px solid #222; border-radius:16px; padding:40px; width:100%; max-width:400px; }
        h1 { color:white; font-size:2rem; font-weight:900; letter-spacing:3px; text-align:center; margin-bottom:8px; }
        h1 span { color:#ff1e1e; }
        p.subtitle { color:rgba(255,255,255,0.4); text-align:center; font-size:0.85rem; letter-spacing:2px; margin-bottom:32px; }
        .form-group { margin-bottom:20px; }
        label { color:rgba(255,255,255,0.6); font-size:0.85rem; display:block; margin-bottom:8px; }
        input { width:100%; padding:12px 16px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; color:white; font-size:0.95rem; outline:none; transition:border 0.2s; }
        input:focus { border-color:#ff1e1e; }
        button { width:100%; padding:14px; background:#ff1e1e; color:white; border:none; border-radius:10px; font-size:1rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; margin-top:8px; transition:background 0.2s; }
        button:hover { background:#cc0000; }
        .error { color:#ff1e1e; font-size:0.85rem; margin-top:12px; text-align:center; display:none; }
        .success { color:#22c55e; font-size:0.85rem; margin-top:12px; text-align:center; display:none; }
        .link { color:rgba(255,255,255,0.4); text-align:center; margin-top:20px; font-size:0.9rem; }
        .link a { color:#ff1e1e; text-decoration:none; }
        .requirements { color:rgba(255,255,255,0.3); font-size:0.8rem; margin-top:6px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏋️ Fit<span>Bot</span></h1>
        <p class="subtitle">SET NEW PASSWORD</p>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="password" placeholder="••••••••"/>
            <p class="requirements">Minimum 6 characters</p>
        </div>

        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirm-password" placeholder="••••••••" onkeypress="handleKey(event)"/>
        </div>

        <button onclick="resetPassword()">Reset Password 💪</button>
        <p class="error" id="error-msg"></p>
        <p class="success" id="success-msg"></p>
        <p class="link"><a href="/login">← Back to Login</a></p>
    </div>

    <script>
        const token = window.location.pathname.split('/').pop();

        async function resetPassword() {
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!password || !confirmPassword) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Please fill in all fields!';
                return;
            }

            if (password !== confirmPassword) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Passwords do not match!';
                return;
            }

            if (password.length < 6) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Password must be at least 6 characters!';
                return;
            }

            const response = await fetch(`/reset-password/${token}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });

            const data = await response.json();

            if (data.success) {
                successMsg.style.display = 'block';
                successMsg.textContent = 'Password reset! Redirecting to login...';
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                errorMsg.style.display = 'block';
                errorMsg.textContent = data.error;
            }
        }

        function handleKey(e) { if (e.key === 'Enter') resetPassword(); }
    </script>
</body>
</html>
