<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBot - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body {
            background: #000a1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 10, 30, 0.90);
            z-index: 0;
        }
        .card {
            position: relative;
            z-index: 1;
            background: rgba(0, 5, 20, 0.95);
            border: 1px solid rgba(0, 120, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(0, 120, 255, 0.15);
        }
        .logo { text-align: center; margin-bottom: 8px; }
        .logo h1 { color: white; font-size: 2rem; font-weight: 900; letter-spacing: 3px; }
        .logo h1 span { color: #0078ff; }
        .logo p { color: rgba(255,255,255,0.4); font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
        .divider { height: 1px; background: rgba(0, 120, 255, 0.2); margin: 24px 0; }
        .form-group { margin-bottom: 16px; }
        label { color: rgba(255,255,255,0.6); font-size: 0.8rem; display: block; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        input { width: 100%; padding: 13px 16px; background: rgba(0, 120, 255, 0.05); border: 1px solid rgba(0, 120, 255, 0.2); border-radius: 10px; color: white; font-size: 0.95rem; outline: none; transition: border 0.2s; font-family: 'Inter', sans-serif; }
        input:focus { border-color: #0078ff; background: rgba(0, 120, 255, 0.08); }
        input::placeholder { color: rgba(255,255,255,0.25); }
        .hint { color: rgba(255,255,255,0.3); font-size: 0.75rem; margin-top: 4px; }
        button { width: 100%; padding: 14px; background: #0078ff; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: all 0.2s; box-shadow: 0 0 20px rgba(0, 120, 255, 0.3); font-family: 'Inter', sans-serif; }
        button:hover { background: #0060cc; }
        .error { color: #ff4444; font-size: 0.85rem; margin-top: 12px; text-align: center; display: none; }
        .success { color: #22c55e; font-size: 0.85rem; margin-top: 12px; text-align: center; display: none; }
        .links { margin-top: 20px; text-align: center; }
        .links a { color: rgba(255,255,255,0.4); font-size: 0.85rem; text-decoration: none; }
        .links a span { color: #0078ff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>🏋️ Fit<span>Bot</span></h1>
            <p>Create Your Account</p>
        </div>
        <div class="divider"></div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="yourname"/>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••"/>
            <p class="hint">Minimum 6 characters</p>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="••••••••" onkeypress="handleKey(event)"/>
        </div>
        <button onclick="register()">Create Account 💪</button>
        <p class="error" id="error-msg"></p>
        <p class="success" id="success-msg"></p>
        <div class="links">
            <a href="/login">Already have an account? <span>Login</span></a>
        </div>
    </div>
    <script>
        async function register() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            if (!username || !email || !password || !confirmPassword) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Please fill in all fields!';
                return;
            }
            if (password !== confirmPassword) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Passwords do not match!';
                return;
            }
            if (password.length < 6) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Password must be at least 6 characters!';
                return;
            }
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await response.json();
            if (data.success) {
                successMsg.style.display = 'block';
                successMsg.textContent = 'Account created! Redirecting to login...';
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                errorMsg.style.display = 'block';
                errorMsg.textContent = data.error;
            }
        }
        function handleKey(event) { if (event.key === 'Enter') register(); }
    </script>
</body>
</html>
