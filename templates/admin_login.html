<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBot Admin</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#0a0a0a; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:#111; border:1px solid #222; border-radius:16px; padding:40px; width:100%; max-width:400px; }
        h1 { color:white; font-size:1.5rem; font-weight:900; text-align:center; margin-bottom:8px; }
        h1 span { color:#ff1e1e; }
        p { color:rgba(255,255,255,0.4); text-align:center; font-size:0.85rem; margin-bottom:24px; }
        input { width:100%; padding:12px 16px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; color:white; font-size:0.95rem; outline:none; margin-bottom:16px; }
        input:focus { border-color:#ff1e1e; }
        button { width:100%; padding:14px; background:#ff1e1e; color:white; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; }
        button:hover { background:#cc0000; }
        .error { color:#ff1e1e; font-size:0.85rem; text-align:center; margin-top:12px; display:none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Fit<span>Bot</span> Admin</h1>
        <p>Enter admin password to continue</p>
        <input type="password" id="password" placeholder="Admin password" onkeypress="handleKey(event)"/>
        <button onclick="login()">Login</button>
        <p class="error" id="error-msg"></p>
    </div>
    <script>
        async function login() {
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const response = await fetch('/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await response.json();
            if (data.success) {
                window.location.href = '/admin';
            } else {
                errorMsg.style.display = 'block';
                errorMsg.textContent = data.error;
            }
        }
        function handleKey(e) { if (e.key === 'Enter') login(); }
    </script>
</body>
</html>
