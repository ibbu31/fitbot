<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBot - Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body {
            background: #000a1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(0, 5, 20, 0.95);
            border: 1px solid rgba(0, 120, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(0, 120, 255, 0.15);
        }
        .logo { text-align: center; margin-bottom: 8px; }
        .logo h1 { color: white; font-size: 2rem; font-weight: 900; letter-spacing: 3px; }
        .logo h1 span { color: #0078ff; }
        .logo p { color: rgba(255,255,255,0.4); font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
        .divider { height: 1px; background: rgba(0, 120, 255, 0.2); margin: 24px 0; }
        .form-group { margin-bottom: 20px; }
        label { color: rgba(255,255,255,0.6); font-size: 0.8rem; display: block; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        input { width: 100%; padding: 13px 16px; background: rgba(0, 120, 255, 0.05); border: 1px solid rgba(0, 120, 255, 0.2); border-radius: 10px; color: white; font-size: 0.95rem; outline: none; transition: border 0.2s; font-family: 'Inter', sans-serif; }
        input:focus { border-color: #0078ff; background: rgba(0, 120, 255, 0.08); }
        input::placeholder { color: rgba(255,255,255,0.25); }
        button { width: 100%; padding: 14px; background: #0078ff; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: all 0.2s; box-shadow: 0 0 20px rgba(0, 120, 255, 0.3); font-family: 'Inter', sans-serif; }
        button:hover { background: #0060cc; }
        .error { color: #ff4444; font-size: 0.85rem; margin-top: 12px; text-align: center; display: none; }
        .success { color: #22c55e; font-size: 0.85rem; margin-top: 12px; text-align: center; display: none; }
        .links { margin-top: 20px; text-align: center; }
        .links a { color: rgba(255,255,255,0.4); font-size: 0.85rem; text-decoration: none; }
        .links a span { color: #0078ff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>🏋️ Fit<span>Bot</span></h1>
            <p>Reset Your Password</p>
        </div>
        <div class="divider"></div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="your@email.com" onkeypress="handleKey(event)"/>
        </div>
        <button onclick="sendReset()">Send Reset Link 💪</button>
        <p class="error" id="error-msg"></p>
        <p class="success" id="success-msg"></p>
        <div class="links">
            <a href="/login">← <span>Back to Login</span></a>
        </div>
    </div>
    <script>
        async function sendReset() {
            const email = document.getElementById('email').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            if (!email) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Please enter your email!';
                return;
            }
            const response = await fetch('/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await response.json();
            if (data.success) {
                successMsg.style.display = 'block';
                successMsg.textContent = data.message;
            } else {
                errorMsg.style.display = 'block';
                errorMsg.textContent = data.error;
            }
        }
        function handleKey(e) { if (e.key === 'Enter') sendReset(); }
    </script>
</body>
</html>
