<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBot - AI Fitness Coach</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>🏋️ Fit<span>Bot</span></h1>
        <p>Your Personal AI Fitness Coach</p>
    </div>

    <!-- Chat Container -->
    <div class="chat-container">

        <!-- Chat Box -->
        <div class="chat-box" id="chat-box">
            <div class="message bot-message">
                👋 Hey! I am FitBot, your personal AI fitness coach. Type, speak 🎤, or show me a photo 📸 of your food or exercise!
            </div>
        </div>

        <!-- Image Preview -->
        <div id="image-preview-container" style="display:none; padding: 10px; background:#111;">
            <img id="image-preview" style="max-width: 200px; border-radius: 10px;"/>
            <button onclick="clearImage()" style="margin-left:10px; background:#ff1e1e; color:white; border:none; border-radius:5px; padding:5px 10px; cursor:pointer;">❌ Remove</button>
        </div>

        <!-- Input Area -->
        <div class="input-area">

            <!-- Camera Button -->
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="handleImage(event)"/>
            <button class="icon-btn" onclick="document.getElementById('camera-input').click()" title="Send Photo">📸</button>

            <!-- Text Input -->
            <input 
                type="text" 
                id="user-input" 
                placeholder="Type, speak 🎤 or send a photo 📸..." 
                onkeypress="handleKey(event)"
            />

            <!-- Mic Button -->
            <button class="icon-btn" onclick="startVoice()" id="mic-btn" title="Voice Input">🎤</button>

            <!-- Voice Toggle Button -->
            <button class="icon-btn" onclick="toggleVoice()" id="voice-toggle-btn" title="Voice ON">🔊</button>

            <!-- Send Button -->
            <button class="send-btn" onclick="sendMessage()">Send 💪</button>

        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
